import = ["/Users/jack/.config/alacritty/themes/solarized_dark_hc.toml"]

[bell]
animation = "EaseOutQuad"
color = "#555555"
duration = 100

[cursor]
blink_interval = 600
blink_timeout = 0

[cursor.style]
blinking = "On"

[font]
size = 12.0

[font.glyph_offset]
x = 0
y = -1

[font.normal]
family = "Input Mono"

[font.offset]
x = 0
y = 3

[window]
decorations = "buttonless"

[window.dimensions]
columns = 100
lines = 30

[window.padding]
x = 12
y = 12
